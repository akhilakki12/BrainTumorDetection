<!DOCTYPE html>
<html>
<head>
    <title>Brain Tumor Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #141E30, #243B55);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.2);
            width: 50%;
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        input[type="file"] {
            margin: 15px 0;
        }

        button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .result-box {
            margin-top: 25px;
            padding: 20px;
            background: #f4f6f9;
            border-radius: 12px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }

        .result-box h2 {
            margin: 10px 0;
            color: #2c3e50;
        }

        .confidence {
            font-weight: 600;
            color: #27ae60;
        }

        img {
            margin-top: 15px;
            width: 250px;
            border-radius: 12px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }

    </style>
</head>

<body>
    <div class="container">
        <h1>🧠 Brain Tumor MRI Classification</h1>

        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="file" required>
            <br>
            <button type="submit">Predict</button>
        </form>

        {% if result %}
        <div class="result-box">
            <h2>{{ result }}</h2>
            <p class="confidence">Confidence: {{ confidence }}</p>
            <img src="{{ url_for('uploaded_file', filename=file_path) }}"/>
        </div>
        {% endif %}
    </div>
</body>
</html>
